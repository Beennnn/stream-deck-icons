  <g fill="#1c1c22"><rect x="27" y="82" width="3.5" height="11"/><rect x="37" y="82" width="3.5" height="11"/><rect x="52" y="82" width="3.5" height="11"/><rect x="62" y="82" width="3.5" height="11"/><rect x="72" y="82" width="3.5" height="11"/><rect x="87" y="82" width="3.5" height="11"/><rect x="97" y="82" width="3.5" height="11"/><rect x="112" y="82" width="3.5" height="11"/></g>
  <!-- pitch/mod wheels -->
  <rect x="16" y="82" width="6" height="14" rx="3" fill="#3ee0c8"/>
</svg>
