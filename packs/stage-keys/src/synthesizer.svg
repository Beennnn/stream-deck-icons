<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <!-- classic mono analog synth (Minimoog vibe) -->
  <path d="M20 52 L124 52 L124 100 L20 100 Z" fill="#2a2a30"/>
  <!-- wood cheeks -->
  <rect x="14" y="48" width="10" height="56" rx="3" fill="#6b4322"/>
  <rect x="120" y="48" width="10" height="56" rx="3" fill="#6b4322"/>
