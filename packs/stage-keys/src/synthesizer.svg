  <path d="M28 34 L116 34 L124 52 L20 52 Z" fill="#1c1c22"/>
  <g fill="#c9ccd2"><circle cx="40" cy="43" r="4"/><circle cx="56" cy="43" r="4"/><circle cx="72" cy="43" r="4"/><circle cx="88" cy="43" r="4"/><circle cx="104" cy="43" r="4"/></g>
  <g stroke="#2a2a30" stroke-width="1.4"><line x1="40" y1="39" x2="40" y2="43"/><line x1="56" y1="47" x2="56" y2="43"/><line x1="72" y1="40" x2="72" y2="43"/><line x1="88" y1="46" x2="88" y2="43"/><line x1="104" y1="41" x2="104" y2="43"/></g>
  <!-- keyboard -->
