<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g transform="rotate(32 72 72)">
    <!-- long wide neck -->
    <rect x="64" y="10" width="16" height="86" rx="4" fill="#6b4322"/>
    <rect x="67" y="10" width="10" height="86" fill="#7d5028"/>
    <!-- curved frets -->
    <g stroke="#c9a24a" stroke-width="1.4" fill="none"><path d="M64 24 q8 3 16 0"/><path d="M64 36 q8 3 16 0"/><path d="M64 48 q8 3 16 0"/><path d="M64 60 q8 3 16 0"/><path d="M64 72 q8 3 16 0"/></g>
    <!-- pegs -->
    <g fill="#3a2412"><rect x="56" y="16" width="8" height="4" rx="2"/><rect x="80" y="16" width="8" height="4" rx="2"/><rect x="56" y="26" width="8" height="4" rx="2"/><rect x="80" y="26" width="8" height="4" rx="2"/></g>
    <!-- round gourd resonator -->
    <ellipse cx="72" cy="112" rx="26" ry="22" fill="#a5652a"/>
    <ellipse cx="72" cy="112" rx="20" ry="16" fill="#c07d38"/>
    <circle cx="72" cy="112" r="5" fill="#4a2a12"/>
    <g stroke="#efe6c8" stroke-width="0.7"><line x1="70" y1="12" x2="70" y2="112"/><line x1="72" y1="12" x2="72" y2="112"/><line x1="74" y1="12" x2="74" y2="112"/></g>
  </g>
</svg>
