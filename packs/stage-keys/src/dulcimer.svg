  <!-- strings -->
  <g stroke="#efe6c8" stroke-width="0.8"><line x1="30" y1="60" x2="112" y2="53"/><line x1="30" y1="65" x2="112" y2="58"/><line x1="31" y1="72" x2="110" y2="66"/><line x1="32" y1="79" x2="109" y2="74"/><line x1="33" y1="85" x2="108" y2="82"/></g>
