  <line x1="70" y1="106" x2="54" y2="122" stroke="#7a5a2a" stroke-width="3" stroke-linecap="round"/><rect x="48" y="120" width="10" height="5" rx="2" fill="#c0392b"/>
  <line x1="84" y1="104" x2="100" y2="122" stroke="#7a5a2a" stroke-width="3" stroke-linecap="round"/><rect x="98" y="120" width="10" height="5" rx="2" fill="#2b6cb0"/>
</svg>
