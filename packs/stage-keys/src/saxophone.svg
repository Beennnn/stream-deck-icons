  <path d="M52 18 q10 -6 18 2" fill="none" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
  <path d="M66 20 q14 6 16 26" fill="none" stroke="#d99a1c" stroke-width="9" stroke-linecap="round"/>
  <!-- main body tube -->
  <path d="M82 46 L88 96" fill="none" stroke="#e0a91e" stroke-width="14" stroke-linecap="round"/>
  <path d="M80 46 L86 92" fill="none" stroke="#f4c542" stroke-width="5" stroke-linecap="round"/>
  <!-- U bend -->
  <path d="M88 96 q4 22 -18 22 q-18 0 -18 -18" fill="none" stroke="#e0a91e" stroke-width="14" stroke-linecap="round"/>
