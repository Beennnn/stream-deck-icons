    <circle cx="83" cy="56" r="3.4"/><circle cx="84" cy="66" r="3.4"/><circle cx="85" cy="76" r="3.4"/><circle cx="86" cy="86" r="3.4"/>
    <circle cx="57" cy="72" r="3.2"/><circle cx="57" cy="82" r="3.2"/><circle cx="57" cy="92" r="3.2"/>
  </g>
