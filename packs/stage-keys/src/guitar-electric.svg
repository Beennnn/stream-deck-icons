<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <!-- electric guitar, diagonal — full colour flat -->
  <g transform="rotate(35 72 72)">
    <!-- neck -->
    <rect x="66" y="12" width="12" height="70" fill="#3a2214"/>
    <rect x="68" y="12" width="8" height="70" fill="#4a2e1a"/>
    <!-- frets -->
    <g stroke="#c9a24a" stroke-width="1.4">
      <line x1="66" y1="24" x2="78" y2="24"/><line x1="66" y1="34" x2="78" y2="34"/>
      <line x1="66" y1="44" x2="78" y2="44"/><line x1="66" y1="54" x2="78" y2="54"/>
      <line x1="66" y1="64" x2="78" y2="64"/>
    </g>
    <!-- headstock -->
    <path d="M64 8 h16 v10 h-16 z" fill="#241309"/>
    <g fill="#d8d8d8"><circle cx="62" cy="10" r="2.4"/><circle cx="62" cy="16" r="2.4"/><circle cx="82" cy="10" r="2.4"/><circle cx="82" cy="16" r="2.4"/></g>
    <!-- body: sunburst -->
    <path d="M72 78 C 44 78 40 100 46 116 C 50 128 60 134 72 134 C 84 134 94 128 98 116 C 104 100 100 78 72 78 Z" fill="#c0392b"/>
    <path d="M72 84 C 52 84 48 102 53 114 C 57 124 64 128 72 128 C 80 128 87 124 91 114 C 96 102 92 84 72 84 Z" fill="#e8743b"/>
    <path d="M72 90 C 58 90 55 103 59 112 C 62 120 67 123 72 123 C 77 123 82 120 85 112 C 89 103 86 90 72 90 Z" fill="#f2c14e"/>
    <!-- pickups + bridge -->
    <rect x="64" y="92" width="16" height="6" rx="1.5" fill="#1a1a1a"/>
    <rect x="64" y="104" width="16" height="6" rx="1.5" fill="#1a1a1a"/>
    <rect x="66" y="116" width="12" height="5" rx="1.5" fill="#c0c0c0"/>
    <!-- strings -->
    <g stroke="#e6e6e6" stroke-width="0.8"><line x1="69" y1="14" x2="69" y2="120"/><line x1="72" y1="14" x2="72" y2="120"/><line x1="75" y1="14" x2="75" y2="120"/></g>
  </g>
</svg>
